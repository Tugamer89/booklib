name: CI & Auto-Formatting

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-format:
    name: lint-and-format
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Code checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Generate uv.lock
        run: uv lock

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies from lockfile
        run: uv sync --all-extras --dev

      - name: Linting and Formatting Execution
        continue-on-error: true
        run: uv run pre-commit run --all-files

      - name: Push formatting changes and lockfile changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: auto-format code and update lockfile"

      - name: Verify no unfixable errors remain
        run: uv run pre-commit run --all-files

  lint-and-format-bypass:
    name: lint-and-format
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.actor == 'github-actions[bot]'
    steps:
      - name: Fast-pass per Bot
        run: echo "Operazione avviata da un bot. Salto formattazione e linting per sbloccare la CI."
