<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Admin - Gestione utenti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/popup.js" defer></script>
    <script src="/static/js/theme.js" defer></script>
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        html {
            background-image: linear-gradient(to bottom right, #e0f2fe, #c7d2fe);

            scrollbar-gutter: stable;

            /* Firefox: */
            scrollbar-width: auto;
            scrollbar-color: #94a3b8 transparent;
        }

        /* Chrome, Edge, Safari, Opera: */
        html::-webkit-scrollbar {
            width: 16px;
            background-image: linear-gradient(to bottom right, #e0f2fe, #c7d2fe);
        }

        html::-webkit-scrollbar-thumb {
            background-color: #94a3b8;
            border-radius: 8px;
            border: 4px solid transparent;
            background-clip: content-box;
        }

        html::-webkit-scrollbar-thumb:hover {
            background-color: #64748b;
        }

        html::-webkit-scrollbar-corner {
            background-image: linear-gradient(to bottom right, #e0f2fe, #c7d2fe);
        }
        
        .toggle-password {
            cursor: pointer;
            user-select: none;
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #4f46e5;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-5xl p-8">
        <h1 class="text-3xl font-bold mb-6 text-indigo-700 text-center">Gestione utenti</h1>
        
        <!-- Popup di conferma eliminazione -->
        <div id="confirmOverlay" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
            <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-sm text-center space-y-4">
                <h2 class="text-lg font-semibold text-gray-800">Sei sicuro di voler eliminare questo utente?</h2>
                <div class="flex justify-center gap-4">
                    <button id="cancelDelete" class="px-4 py-2 bg-gray-300 hover:bg-gray-400 rounded shadow">Annulla</button>
                    <button id="confirmDelete" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded shadow">Elimina</button>
                </div>
            </div>
        </div>

        <!-- Messaggi -->
        {% if msg %}
            <div class="bg-green-100 border border-green-300 text-green-800 px-4 py-2 mb-4 rounded-md shadow-sm text-center">
                {{ msg }}
            </div>
        {% endif %}
        {% if error %}
            <div class="bg-red-100 border border-red-300 text-red-800 px-4 py-2 mb-4 rounded-md shadow-sm text-center">
                {{ error }}
            </div>
        {% endif %}

        <!-- Tabella utenti -->
        <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
            <table class="w-full text-sm">
                <thead class="bg-indigo-50 text-indigo-700 font-semibold">
                    <tr>
                        <th class="p-3 text-left">ID</th>
                        <th class="p-3 text-left">Username</th>
                        <th class="p-3 text-left">Azioni</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {% for user in users %}
                    <tr class="hover:bg-indigo-50 transition">
                        <td class="p-3">{{ user.id }}</td>
                        <td class="p-3">{{ user.username }}</td>
                        <td class="p-3 space-x-3">

                            <!-- Reset Password Form -->
                            <form method="post" action="/admin/users/reset-password" class="inline-block relative">
                                <input type="hidden" name="user_id" value="{{ user.id }}" />
                                <div class="relative inline-block">
                                    <input
                                        type="password"
                                        name="new_password"
                                        placeholder="Nuova password"
                                        required
                                        minlength="8"
                                        class="pr-10 p-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        autocomplete="new-password"
                                    />
                                    <span class="toggle-password" onclick="togglePassword(this)" title="Mostra/Nascondi password">👁️</span>
                                </div>
                                <button
                                    type="submit"
                                    class="ml-2 bg-indigo-600 hover:bg-indigo-800 text-white px-4 py-1 rounded font-semibold transition"
                                >Reset</button>
                            </form>

                            <!-- Delete User Form -->
                            <form method="post" action="/admin/users/delete" class="inline-block">
                                <input type="hidden" name="user_id" value="{{ user.id }}" />
                                <button type="submit" class="bg-red-600 hover:bg-red-800 text-white px-4 py-1 rounded font-semibold transition">
                                    Elimina
                                </button>
                            </form>

                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function togglePassword(span) {
            const input = span.previousElementSibling;
            if (input.type === "password") {
                input.type = "text";
                span.textContent = "🙈";
            } else {
                input.type = "password";
                span.textContent = "👁️";
            }
        }
    </script>

</body>
</html>
