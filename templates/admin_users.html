<!DOCTYPE html>
<html lang="it" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestione Utenti</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style type="text/tailwindcss">
         @layer components {
            .input-style {
                @apply w-full px-3 py-1 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500;
            }
            .password-container {
                @apply relative flex-grow;
            }
            .password-toggle-icon {
                @apply absolute inset-y-0 right-0 flex items-center pr-2 cursor-pointer text-slate-400 hover:text-slate-600 dark:hover:text-slate-200;
            }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen p-4 sm:p-8">

     <div class="absolute top-4 right-4 pwa-drag-area">
        <button id="theme-toggle" class="p-2 rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700 transition pwa-no-drag" aria-label="Toggle theme"></button>
    </div>

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
            <h1 class="text-3xl font-bold text-slate-800 dark:text-slate-100">Gestione Utenti</h1>
            <a href="/" class="text-sm font-medium text-indigo-600 hover:underline dark:text-indigo-400">Torna alla Libreria</a>
        </div>

        {% if msg %}
            <div class="bg-green-100 dark:bg-green-900/50 border border-green-300 dark:border-green-600/50 text-green-800 dark:text-green-300 px-4 py-3 rounded-lg mb-4">{{ msg }}</div>
        {% endif %}
        {% if error %}
            <div class="bg-red-100 dark:bg-red-900/50 border border-red-300 dark:border-red-600/50 text-red-800 dark:text-red-300 px-4 py-3 rounded-lg mb-4">{{ error }}</div>
        {% endif %}

        <div class="bg-white dark:bg-slate-800 rounded-lg shadow-md overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-100 dark:bg-slate-700">
                    <tr>
                        <th class="p-4 text-sm font-semibold whitespace-nowrap">ID</th>
                        <th class="p-4 text-sm font-semibold whitespace-nowrap">Username</th>
                        <th class="p-4 text-sm font-semibold whitespace-nowrap">Email</th>
                        <th class="p-4 text-sm font-semibold whitespace-nowrap text-center">Verificato</th>
                        <th class="p-4 text-sm font-semibold whitespace-nowrap">Azioni</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                    {% for user in users %}
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50">
                        <td class="p-4 text-sm">{{ user.id }}</td>
                        <td class="p-4 text-sm font-medium">{{ user.username }}</td>
                        <td class="p-4 text-sm text-slate-600 dark:text-slate-400">{{ user.email }}</td>
                        <td class="p-4 text-sm text-center">
                            {% if user.is_verified %}
                                <span class="text-green-600 dark:text-green-400">✔</span>
                            {% else %}
                                <span class="text-red-600 dark:text-red-400">✖</span>
                            {% endif %}
                        </td>
                        <td class="p-4">
                            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                                <form method="post" action="/admin/users/reset-password" class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full sm:w-auto">
                                    <input type="hidden" name="user_id" value="{{ user.id }}">
                                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                                    <div class="password-container w-full sm:w-40">
                                        <input type="password" name="new_password" placeholder="Nuova password" minlength="8" required class="input-style pr-8" id="password-{{ user.id }}">
                                        <span class="password-toggle-icon" data-target="password-{{ user.id }}">
                                            <svg class="w-4 h-4 eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L6.228 6.228" /></svg>
                                            <svg class="w-4 h-4 eye-open hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                                        </span>
                                    </div>
                                    <button type="submit" class="px-3 py-1 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 whitespace-nowrap">Reset Pass</button>
                                </form>
                                <form method="post" action="/admin/users/delete" onsubmit="return confirm('Sei sicuro di voler eliminare l\\'utente {{ user.username }}? Questa azione è irreversibile.');">
                                    <input type="hidden" name="user_id" value="{{ user.id }}">
                                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                                    <button type="submit" class="px-3 py-1 bg-red-600 text-white text-sm rounded-md hover:bg-red-700">Elimina</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const html = document.documentElement;
            const applyTheme = (theme) => {
                if (theme === 'dark') {
                    html.classList.add('dark');
                    themeToggle.innerHTML = '☀️';
                } else {
                    html.classList.remove('dark');
                    themeToggle.innerHTML = '🌙';
                }
            };
            themeToggle.addEventListener('click', () => {
                const newTheme = html.classList.contains('dark') ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });
            applyTheme(html.classList.contains('dark') ? 'dark' : 'light');

            document.querySelectorAll('.password-toggle-icon').forEach(icon => {
                icon.addEventListener('click', () => {
                    const targetInputId = icon.getAttribute('data-target');
                    const targetInput = document.getElementById(targetInputId);
                    const eyeOpen = icon.querySelector('.eye-open');
                    const eyeClosed = icon.querySelector('.eye-closed');

                    if (targetInput.type === 'password') {
                        targetInput.type = 'text';
                        eyeOpen.classList.remove('hidden');
                        eyeClosed.classList.add('hidden');
                    } else {
                        targetInput.type = 'password';
                        eyeOpen.classList.add('hidden');
                        eyeClosed.classList.remove('hidden');
                    }
                });
            });
        });
    </script>
</body>
</html>
