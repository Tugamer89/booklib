<!DOCTYPE html>
<html lang="it" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestione Utenti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen p-4 sm:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
            <h1 class="text-3xl font-bold text-slate-800 dark:text-slate-100">Gestione Utenti</h1>
            <a href="/" class="text-sm font-medium text-indigo-600 hover:underline dark:text-indigo-400">Torna alla Libreria</a>
        </div>

        {% if msg %}
            <div class="bg-green-100 dark:bg-green-900/50 border border-green-300 dark:border-green-600/50 text-green-800 dark:text-green-300 px-4 py-3 rounded-lg mb-4">{{ msg }}</div>
        {% endif %}
        {% if error %}
            <div class="bg-red-100 dark:bg-red-900/50 border border-red-300 dark:border-red-600/50 text-red-800 dark:text-red-300 px-4 py-3 rounded-lg mb-4">{{ error }}</div>
        {% endif %}

        <div class="bg-white dark:bg-slate-800 rounded-lg shadow-md overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-100 dark:bg-slate-700">
                    <tr>
                        <th class="p-4 text-sm font-semibold whitespace-nowrap">ID</th>
                        <th class="p-4 text-sm font-semibold whitespace-nowrap">Username</th>
                        <th class="p-4 text-sm font-semibold whitespace-nowrap">Azioni</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                    {% for user in users %}
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50">
                        <td class="p-4">{{ user.id }}</td>
                        <td class="p-4 font-medium">{{ user.username }}</td>
                        <td class="p-4">
                            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                                <form method="post" action="/admin/users/reset-password" class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full sm:w-auto">
                                    <input type="hidden" name="user_id" value="{{ user.id }}">
                                    <input type="password" name="new_password" placeholder="Nuova password" minlength="8" required class="w-full sm:w-40 px-3 py-1 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md text-sm">
                                    <button type="submit" class="px-3 py-1 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 whitespace-nowrap">Reset Pass</button>
                                </form>
                                <form method="post" action="/admin/users/delete" onsubmit="return confirm('Sei sicuro di voler eliminare l\\'utente {{ user.username }}?');">
                                    <input type="hidden" name="user_id" value="{{ user.id }}">
                                    <button type="submit" class="px-3 py-1 bg-red-600 text-white text-sm rounded-md hover:bg-red-700">Elimina</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
