<!DOCTYPE html>
<html lang="it" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Libreria di Casa</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .input-style {
                @apply w-full px-4 py-2 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100;
            }
             .eye-icon {
                @apply absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-slate-600 dark:hover:text-slate-200;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-800 dark:to-slate-900 transition-colors duration-300 flex items-center justify-center min-h-screen p-4">

    <div class="absolute top-4 right-4 pwa-drag-area">
        <button id="theme-toggle" class="p-2 rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700 transition pwa-no-drag" aria-label="Toggle theme"></button>
    </div>

    <div class="w-full max-w-md p-8 space-y-6 bg-white dark:bg-slate-800 shadow-xl rounded-2xl">
        <h1 class="text-3xl font-bold text-center text-slate-800 dark:text-slate-100">Imposta Nuova Password</h1>
        <p class="text-center text-slate-600 dark:text-slate-300">
            Inserisci la tua nuova password.
        </p>

        <div id="error-container" class="{% if not error %}hidden{% endif %} bg-red-100 dark:bg-red-900/50 border border-red-400 dark:border-red-500/50 text-red-700 dark:text-red-300 px-4 py-3 rounded-lg" role="alert">
            <span id="error-message">{{ error }}</span>
        </div>
        
        <div id="msg-container" class="{% if not msg %}hidden{% endif %} bg-green-100 dark:bg-green-900/50 border border-green-300 dark:border-green-600/50 text-green-800 dark:text-green-300 px-4 py-3 rounded-lg" role="alert">
            <span id="msg-message">{{ msg }}</span>
        </div>

        <form action="/reset-password" method="post" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Nuova Password</label>
                <div class="relative">
                    <input name="password" id="password" type="password" required minlength="8" placeholder="Minimo 8 caratteri" class="input-style mt-1 pr-10">
                    <span class="eye-icon" onclick="togglePasswordVisibility('password')">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-.474 1.29-1.218 2.45-2.09 3.447m-1.748-1.07A10.08 10.08 0 0112 17c-4.478 0-8.268-2.943-9.542-7a16.48 16.48 0 013.29-4.708"></path></svg>
                    </span>
                </div>
            </div>
            
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Conferma Nuova Password</label>
                <div class="relative">
                     <input name="confirm_password" id="confirm_password" type="password" required minlength="8" placeholder="Ripeti la password" class="input-style mt-1 pr-10">
                     <span class="eye-icon" onclick="togglePasswordVisibility('confirm_password')">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-.474 1.29-1.218 2.45-2.09 3.447m-1.748-1.07A10.08 10.08 0 0112 17c-4.478 0-8.268-2.943-9.542-7a16.48 16.48 0 013.29-4.708"></path></svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="w-full py-2 px-4 bg-indigo-600 text-white font-semibold rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 dark:focus:ring-offset-slate-800 transition-colors duration-300">
                Imposta nuova password
            </button>
        </form>
    </div>

    <script>
        function togglePasswordVisibility(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = input.nextElementSibling.firstElementChild;
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 .964-2.65 2.74-4.832 4.93-6.191M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.so 0 113.536 3.536L6.5 21.036H3v-3.5L14.732 3.732z"></path><path d="M1 1l22 22"></path>`; // Icona occhio sbarrato
            } else {
                input.type = "password";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-.474 1.29-1.218 2.45-2.09 3.447m-1.748-1.07A10.08 10.08 0 0112 17c-4.478 0-8.268-2.943-9.542-7a16.48 16.48 0 013.29-4.708"></path>`; // Icona occhio
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const html = document.documentElement;
            const applyTheme = (theme) => {
                if (theme === 'dark') {
                    html.classList.add('dark');
                    themeToggle.innerHTML = '☀️';
                } else {
                    html.classList.remove('dark');
                    themeToggle.innerHTML = '🌙';
                }
            };
            
            themeToggle.addEventListener('click', () => {
                const newTheme = html.classList.contains('dark') ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });

            applyTheme(html.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
