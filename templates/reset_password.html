<!DOCTYPE html>
<html lang="it" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Libreria di Casa</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && globalThis.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .input-style {
                @apply w-full px-4 py-2 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500;
            }
            .password-container {
                @apply relative;
            }
            .password-toggle-icon {
                @apply absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-slate-400 hover:text-slate-600 dark:hover:text-slate-200;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-800 dark:to-slate-900 transition-colors duration-300 flex items-center justify-center min-h-[100svh] p-4">

    <div class="absolute top-4 right-4 pwa-drag-area">
        <button id="theme-toggle" class="p-2 rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700 transition pwa-no-drag" aria-label="Toggle theme"></button>
    </div>

    <div class="w-full max-w-md p-8 space-y-6 bg-white dark:bg-slate-800 shadow-xl rounded-2xl">
        <h1 class="text-3xl font-bold text-center text-slate-800 dark:text-slate-100">Imposta Nuova Password</h1>
        <p class="text-center text-slate-600 dark:text-slate-300">
            Inserisci la tua nuova password.
        </p>

        <div id="error-container" class="{% if not error %}hidden{% endif %} bg-red-100 dark:bg-red-900/50 border border-red-400 dark:border-red-500/50 text-red-700 dark:text-red-300 px-4 py-3 rounded-lg" role="alert">
            <span id="error-message">{{ error }}</span>
        </div>
        
        <div id="msg-container" class="{% if not msg %}hidden{% endif %} bg-green-100 dark:bg-green-900/50 border border-green-300 dark:border-green-600/50 text-green-800 dark:text-green-300 px-4 py-3 rounded-lg" role="alert">
            <span id="msg-message">{{ msg }}</span>
        </div>

        <form action="/reset-password" method="post" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Nuova Password</label>
                <div class="password-container mt-1">
                    <input name="password" id="password" type="password" required minlength="8" placeholder="Minimo 8 caratteri" class="input-style pr-10">
                    <span class="password-toggle-icon" data-target="password">
                        <svg class="w-5 h-5 eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L6.228 6.228" />
                        </svg>
                        <svg class="w-5 h-5 eye-open hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </span>
                </div>
            </div>
            
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Conferma Nuova Password</label>
                <div class="password-container mt-1">
                     <input name="confirm_password" id="confirm_password" type="password" required minlength="8" placeholder="Ripeti la password" class="input-style mt-1 pr-10">
                     <span class="password-toggle-icon" data-target="confirm_password">
                        <svg class="w-5 h-5 eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L6.228 6.228" />
                        </svg>
                        <svg class="w-5 h-5 eye-open hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="w-full py-2 px-4 bg-indigo-600 text-white font-semibold rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 dark:focus:ring-offset-slate-800 transition-colors duration-300">
                Imposta nuova password
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const html = document.documentElement;
            const applyTheme = (theme) => {
                if (theme === 'dark') {
                    html.classList.add('dark');
                    themeToggle.innerHTML = '☀️';
                } else {
                    html.classList.remove('dark');
                    themeToggle.innerHTML = '🌙';
                }
            };
            
            themeToggle.addEventListener('click', () => {
                const newTheme = html.classList.contains('dark') ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });

            applyTheme(html.classList.contains('dark') ? 'dark' : 'light');

            for (const icon of document.querySelectorAll('.password-toggle-icon')) {
                icon.addEventListener('click', () => {
                    const targetInputId = icon.dataset.target;
                    const targetInput = document.getElementById(targetInputId);
                    const eyeOpen = icon.querySelector('.eye-open');
                    const eyeClosed = icon.querySelector('.eye-closed');

                    if (targetInput.type === 'password') {
                        targetInput.type = 'text';
                        eyeOpen.classList.remove('hidden');
                        eyeClosed.classList.add('hidden');
                    } else {
                        targetInput.type = 'password';
                        eyeOpen.classList.add('hidden');
                        eyeClosed.classList.remove('hidden');
                    }
                });
            }
        });
    </script>
</body>
</html>
