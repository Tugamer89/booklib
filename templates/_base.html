<!doctype html>
<html lang="en" class="">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        {% block meta %}
        <meta
            name="description"
            content="{% block description %}BookLib - Manage your home library.{% endblock %}"
        />
        {% endblock %}
        <title>{% block title %}BookLib{% endblock %}</title>

        <link rel="manifest" href="/manifest.json" />
        <link rel="icon" href="/favicon.ico" type="image/x-icon" />

        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = { darkMode: "class" };
        </script>
        <script
            src="https://unpkg.com/lucide@1.16.0"
            integrity="sha384-ZgnJ3Zpr70Xoify35DjOZWqHib1iYJBpYpQUIEpDASG9+fJ745WzNQuC004dwU0W"
            crossorigin="anonymous"
        ></script>

        <style type="text/tailwindcss">
            @layer components {
                .input-style {
                    @apply w-full px-4 py-2 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500;
                    font-weight: normal;
                }
                /* Container for password input + icon */
                .password-container {
                    @apply relative;
                }
                /* Eye icon to show/hide password */
                .password-toggle-icon {
                    @apply absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 rounded-md focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500;
                }
            }
            /* Styles for the login/register page */
            .form-container {
                transition:
                    opacity 0.2s ease-in-out,
                    max-height 0.3s ease-in-out;
                overflow: hidden;
                max-height: 500px; /* Large enough to hold the form */
                opacity: 1;
            }
            .form-inactive {
                max-height: 0px !important;
                opacity: 0 !important;
                /* Remove padding and margin when collapsed to avoid extra space */
                margin: 0 !important;
                padding: 0 !important;
            }
        </style>

        {% block head_extra %}{% endblock %}

        <script>
            if (
                localStorage.theme === "dark" ||
                (!("theme" in localStorage) &&
                    globalThis.matchMedia("(prefers-color-scheme: dark)").matches)
            ) {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        </script>
    </head>
    <body
        class="bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-800 dark:to-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300"
    >
        <div class="absolute top-4 right-4 pwa-drag-area">
            <button
                id="theme-toggle"
                class="fixed top-4 right-4 z-50 p-2 rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700 transition focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 pwa-no-drag"
                aria-label="Toggle theme"
            ></button>
        </div>

        <main class="flex items-center justify-center min-h-[100svh] p-4">
            {% block content %}{% endblock %}
        </main>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const themeToggle = document.getElementById("theme-toggle");
                if (themeToggle) {
                    const html = document.documentElement;

                    const applyTheme = (theme) => {
                        if (theme === "dark") {
                            html.classList.add("dark");
                            themeToggle.innerHTML =
                                '<i data-lucide="sun" class="w-6 h-6 text-yellow-500"></i>';
                        } else {
                            html.classList.remove("dark");
                            themeToggle.innerHTML =
                                '<i data-lucide="moon" class="w-6 h-6 text-slate-500"></i>';
                        }
                        if (globalThis.lucide) {
                            lucide.createIcons();
                        }
                    };

                    themeToggle.addEventListener("click", (e) => {
                        e.preventDefault();
                        const newTheme = html.classList.contains("dark") ? "light" : "dark";
                        localStorage.setItem("theme", newTheme);
                        applyTheme(newTheme);
                    });

                    applyTheme(html.classList.contains("dark") ? "dark" : "light");
                }
            });
        </script>

        {% block scripts %}{% endblock %}
    </body>
</html>
