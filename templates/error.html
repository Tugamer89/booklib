<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Errore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: linear-gradient(to bottom right, #e0f2fe, #c7d2fe);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-gray-800">
    <div class="bg-white/90 backdrop-blur-md rounded-xl shadow-lg p-10 max-w-lg text-center">
        <h1 class="text-6xl font-bold text-red-500 mb-4">{{ status_code }}</h1>
        <h2 class="text-2xl font-semibold mb-2">{{ title }}</h2>
        <p class="text-gray-600 mb-6">{{ message }}</p>
        <a href="{{ referer or '/' }}" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded shadow transition">
            Torna alla home
        </a>
    </div>
</body>
</html>
