<!DOCTYPE html>
<html lang="it" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Libreria di Casa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style type="text/tailwindcss">
        .form-container { transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out; }
        .form-inactive { opacity: 0; transform: translateY(10px); pointer-events: none; position: absolute; left: 0; right: 0; }
        @layer components {
            .input-style {
                @apply w-full px-4 py-2 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-800 dark:to-slate-900 transition-colors duration-300 flex items-center justify-center min-h-screen p-4">

    <div class="absolute top-4 right-4">
        <button id="theme-toggle" class="p-2 rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700 transition" aria-label="Toggle theme"></button>
    </div>

    <div class="w-full max-w-md p-8 space-y-6 bg-white dark:bg-slate-800 shadow-xl rounded-2xl">
        <h1 class="text-3xl font-bold text-center text-slate-800 dark:text-slate-100">📚 Bentornato!</h1>
        
        <div id="error-container" class="hidden bg-red-100 dark:bg-red-900/50 border border-red-400 dark:border-red-500/50 text-red-700 dark:text-red-300 px-4 py-3 rounded-lg" role="alert">
            <span id="error-message"></span>
        </div>

        <div class="flex border-b border-slate-200 dark:border-slate-700">
            <button id="loginTab" class="flex-1 py-2 text-center font-semibold border-b-2 transition-colors duration-300">Accedi</button>
            <button id="registerTab" class="flex-1 py-2 text-center font-semibold border-b-2 transition-colors duration-300">Registrati</button>
        </div>
        
        <form action="/auth" method="post" class="relative h-48">
            <input type="hidden" name="authAction" id="authAction" value="login">
            
            <div id="login-form" class="form-container space-y-4">
                <input name="username" type="text" required placeholder="Username" class="input-style">
                <input name="password" type="password" required placeholder="Password" class="input-style">
            </div>

            <div id="register-form" class="form-container form-inactive space-y-4">
                 <input name="username" type="text" required placeholder="Scegli un Username" class="input-style" disabled>
                <input name="password" type="password" required minlength="8" placeholder="Scegli una Password" class="input-style" disabled>
            </div>

            <button id="submitButton" type="submit" class="w-full absolute bottom-0 py-2 px-4 bg-indigo-600 text-white font-semibold rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 dark:focus:ring-offset-slate-800 transition-colors duration-300">
                Accedi
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const html = document.documentElement;
            const applyTheme = (theme) => {
                if (theme === 'dark') {
                    html.classList.add('dark');
                    themeToggle.innerHTML = '☀️';
                } else {
                    html.classList.remove('dark');
                    themeToggle.innerHTML = '🌙';
                }
            };
            themeToggle.addEventListener('click', () => {
                const newTheme = html.classList.contains('dark') ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });
            applyTheme(html.classList.contains('dark') ? 'dark' : 'light');

            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const authAction = document.getElementById('authAction');
            const submitButton = document.getElementById('submitButton');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const loginInputs = loginForm.querySelectorAll('input');
            const registerInputs = registerForm.querySelectorAll('input');

            const setActiveTab = (mode) => {
                const isLogin = mode === 'login';
                
                authAction.value = mode;
                submitButton.textContent = isLogin ? 'Accedi' : 'Registrati';
                
                loginTab.classList.toggle('border-indigo-500', isLogin);
                loginTab.classList.toggle('text-indigo-600', isLogin);
                loginTab.classList.toggle('dark:text-indigo-400', isLogin);
                loginTab.classList.toggle('text-slate-500', !isLogin);
                
                registerTab.classList.toggle('border-indigo-500', !isLogin);
                registerTab.classList.toggle('text-indigo-600', !isLogin);
                registerTab.classList.toggle('dark:text-indigo-400', !isLogin);
                registerTab.classList.toggle('text-slate-500', isLogin);
                
                loginForm.classList.toggle('form-inactive', !isLogin);
                registerForm.classList.toggle('form-inactive', isLogin);

                loginInputs.forEach(input => input.disabled = !isLogin);
                registerInputs.forEach(input => input.disabled = isLogin);
            };
            
            loginTab.addEventListener('click', () => setActiveTab('login'));
            registerTab.addEventListener('click', () => setActiveTab('register'));
            
            setActiveTab('login');

            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                document.getElementById('error-container').classList.remove('hidden');
                document.getElementById('error-message').textContent = decodeURIComponent(error.replace(/\+/g, ' '));
            }
        });
    </script>
</body>
</html>
